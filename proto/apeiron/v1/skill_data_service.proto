syntax = "proto3";

package apeiron.v1;

option go_package = "db-apeiron/gen/apeiron/v1;apeironv1";

import "apeiron/v1/common.proto";

service SkillDataService {
  rpc GetSkill(IdRequest) returns (SkillResponse);
  rpc GetSkillSet(IdRequest) returns (SkillSetResponse);
  rpc GetSkillSetLoadout(IdRequest) returns (SkillSetLoadoutResponse);
  rpc GetWeaponCombatModeSlots(IdRequest) returns (WeaponCombatModeSlotsResponse);
  rpc GetSkillMovementEffect(IdRequest) returns (SkillMovementEffectResponse);
  rpc GetSkillActionTiming(IdRequest) returns (SkillActionTimingResponse);
  rpc GetSkillMovementActionBinding(IdRequest) returns (SkillMovementActionBindingResponse);
  rpc GetSkillHitboxProfiles(IdRequest) returns (SkillHitboxProfilesResponse);
  rpc GetSkillImpactProfile(IdRequest) returns (SkillImpactProfileResponse);
}

message SkillResponse {
  bool found = 1;
  Skill skill = 2;
  string error = 3;
}

message SkillSetResponse {
  bool found = 1;
  SkillSet skill_set = 2;
  string error = 3;
}

message SkillSetLoadoutResponse {
  bool found = 1;
  repeated SkillLoadoutItem items = 2;
  string error = 3;
}

message WeaponCombatModeSlot {
  string combat_mode_id = 1;
  string input_slot = 2;
  string skill_id = 3;
  bool is_basic_attack = 4;
  bool is_fatality = 5;
  bool is_enabled = 6;
  string metadata_json = 7;
}

message WeaponCombatModeSlotsResponse {
  bool found = 1;
  repeated WeaponCombatModeSlot slots = 2;
  string error = 3;
}

message SkillMovementEffectResponse {
  bool found = 1;
  SkillMovementProfile profile = 2;
  string error = 3;
}

message SkillActionTimingResponse {
  bool found = 1;
  SkillActionTimingContract contract = 2;
  string error = 3;
}

message SkillMovementActionBindingResponse {
  bool found = 1;
  SkillMovementActionBinding binding = 2;
  string error = 3;
}

message SkillHitboxProfilesResponse {
  bool found = 1;
  repeated SkillHitboxProfile profiles = 2;
  string error = 3;
}

message SkillImpactProfileResponse {
  bool found = 1;
  SkillImpactProfile profile = 2;
  string error = 3;
}
