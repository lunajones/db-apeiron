syntax = "proto3";

package apeiron.v1;

option go_package = "db-apeiron/gen/apeiron/v1;apeironv1";

message Empty {}

message OperationResult {
  bool success = 1;
  string message = 2;
}

message IdRequest {
  string id = 1;
}

message Skill {
  string id = 1;
  double base_damage = 2;
  double stamina_cost = 3;
  double mana_cost = 4;
  double health_cost = 5;
  int32 cooldown_ms = 6;
  int32 global_cooldown_ms = 7;
  double max_range = 8;
  bool requires_target = 9;
  bool requires_line_of_sight = 10;
  bool allow_movement = 11;
  int32 movement_lock_ms = 12;
  string skill_type = 13;
  string target_type = 14;
  double damage_multiplier = 15;
  double posture_damage = 16;
  bool is_blockable = 17;
  bool is_parryable = 18;
  int32 max_targets = 19;
  double movement_distance = 20;
  string combo_group = 21;
  int32 combo_step = 22;
  int32 combo_window_ms = 23;
  int32 combo_reset_ms = 24;
  bool interruptible = 25;
  repeated string tags = 26;
  string damage_type = 27;
  string elemental_type = 28;
}

message SkillSet {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_player_usable = 4;
  bool is_npc_usable = 5;
}

message SkillSlot {
  int64 id = 1;
  string skill_set_id = 2;
  string skill_id = 3;
  int32 slot_index = 4;
  bool is_enabled = 5;
  int32 priority = 6;
  double usage_weight = 7;
  int64 cooldown_override_ms = 8;
  double min_target_hp_percent = 9;
  double max_target_hp_percent = 10;
  double min_self_hp_percent = 11;
  double max_self_hp_percent = 12;
  double required_distance_min = 13;
  double required_distance_max = 14;
  bool requires_line_of_sight = 15;
  double opener_weight = 16;
  double finisher_weight = 17;
  string shared_cooldown_group = 18;
  bool use_only_in_combat = 19;
}

message SkillLoadoutItem {
  SkillSlot slot = 1;
  Skill skill = 2;
}

message SkillMovementProfile {
  string id = 1;
  string movement_type = 2;
  double distance = 3;
  double speed = 4;
  int32 duration_ms = 5;
  string movement_start_phase = 6;
  int32 movement_start_offset_ms = 7;
  int32 takeoff_ms = 8;
  int32 landing_lock_ms = 9;
  double arc_height = 10;
  string arc_curve = 11;
  string bounds = 12;
  string steering_policy = 13;
  double max_turn_deg_per_sec = 14;
  double max_total_redirect_angle = 15;
  int32 redirect_lockout_ms = 16;
  bool can_phase_through_targets = 17;
  double min_landing_distance = 18;
  double desired_landing_distance = 19;
  double stop_at_contact_ratio = 20;
  bool applies_knockback = 21;
  double knockback_distance = 22;
  double knockback_speed = 23;
  bool ignores_collision = 24;
}

message SkillHitboxMotionSample {
  int32 sample_index = 1;
  double t = 2;
  double offset_x = 3;
  double offset_y = 4;
  double offset_z = 5;
  double length = 6;
  double radius = 7;
  double size_x = 8;
  double size_y = 9;
  double size_z = 10;
  double start_angle_deg = 11;
  double end_angle_deg = 12;
}

message SkillHitboxMotionProfile {
  string id = 1;
  bool enabled = 2;
  string motion_type = 3;
  string time_basis = 4;
  string interpolation = 5;
  string sweep_shape = 6;
  string damage_group_id = 7;
  repeated SkillHitboxMotionSample samples = 8;
}

message SkillHitboxProfile {
  string id = 1;
  string skill_id = 2;
  string hitbox_shape = 3;
  int32 hitbox_start_ms = 4;
  int32 hitbox_end_ms = 5;
  double offset_x = 6;
  double offset_y = 7;
  double offset_z = 8;
  double length = 9;
  double radius = 10;
  double size_x = 11;
  double size_y = 12;
  double size_z = 13;
  SkillHitboxMotionProfile motion_profile = 14;
  string damage_group_id = 15;
  int32 hitbox_index = 16;
  double angle = 17;
  optional string target_type = 18;
  optional int32 max_targets = 19;
  int32 priority = 20;
  bool requires_line_of_sight = 21;
  bool can_hit_neutral = 22;
}

message SkillImpactProfile {
  string skill_id = 1;
  string impact_type = 2;
  double poise_damage = 3;
  double stagger_power = 4;
  double interrupt_power = 5;
  string hit_reaction = 6;
  double guard_damage_multiplier = 7;
}

message SkillTimingProfile {
  int32 windup_ms = 1;
  int32 active_start_ms = 2;
  int32 active_end_ms = 3;
  int32 recovery_ms = 4;
  int32 action_lock_ms = 5;
  int32 global_cooldown_ms = 6;
  string movement_lock_policy = 7;
}

message MovementCurveSample {
  double t = 1;
  double value = 2;
}

message MovementReconciliationContract {
  string id = 1;
  string category = 2;
  string description = 3;
  double max_smooth_error_cm = 4;
  double hard_snap_error_cm = 5;
  int32 smoothing_time_ms = 6;
  double yaw_tolerance_deg = 7;
  bool owns_position = 8;
  bool owns_yaw = 9;
  bool allows_client_prediction = 10;
  string input_policy = 11;
  string handoff_policy = 12;
  string metadata_json = 13;
}

message RuntimeMovementReconciliationProfile {
  string profile_id = 1;
  double max_speed = 2;
  double sprint_speed_multiplier = 3;
  double acceleration = 4;
  double deceleration = 5;
  double ground_friction = 6;
  double air_acceleration = 7;
  double jump_height = 8;
  int32 jump_duration_ms = 9;
  double rotation_rate_yaw = 10;
  double gravity_scale = 11;
  double braking_friction_factor = 12;
  double max_slope_deg = 13;
  double step_height = 14;
  double base_deadzone = 15;
  double grounded_speed_deadzone_factor = 16;
  double grounded_speed_deadzone_min = 17;
  double grounded_speed_deadzone_max = 18;
  double grounded_transition_deadzone_min = 19;
  double move_sustain_deadzone = 20;
  double move_sustain_transition_deadzone = 21;
  double airborne_deadzone = 22;
  double leap_recent_deadzone = 23;
  double leap_airborne_snapshot_deadzone = 24;
  double leap_landing_deadzone_factor = 25;
  double leap_landing_deadzone_min = 26;
  double leap_landing_deadzone_max = 27;
  double leap_landing_clamp_ignore_deadzone = 28;
  double leap_landing_soft_snap_deadzone = 29;
  double dodge_recent_deadzone = 30;
  double dodge_active_deadzone = 31;
  double dodge_exit_deadzone_factor = 32;
  double dodge_exit_deadzone_min = 33;
  double dodge_exit_deadzone_max = 34;
  double post_action_grounded_deadzone = 35;
  double correction_max_step = 36;
  double hard_snap_distance = 37;
  double severe_desync_distance = 38;
  int32 visual_smoothing_ms = 39;
  double visual_smoothing_max_distance = 40;
  int32 remote_visual_interpolation_ms = 41;
  int32 remote_visual_max_extrapolation_ms = 42;
  double remote_visual_hard_snap_distance = 43;
  int32 dodge_carry_handoff_ms = 44;
  int32 leap_landing_correction_grace_ms = 45;
  int32 leap_grounded_carry_handoff_ms = 46;
  double movement_turn_resubmit_dot_threshold = 47;
  int32 movement_turn_resubmit_min_interval_ms = 48;
  int32 movement_submit_interval_ms = 49;
  int32 snapshot_poll_interval_ms = 50;
  double strafe_speed_multiplier = 51;
  double backpedal_speed_multiplier = 52;
  double strafe_sprint_speed_multiplier = 53;
  double backpedal_sprint_speed_multiplier = 54;
  string metadata_json = 55;
}

message MovementActionContract {
  string id = 1;
  string action_type = 2;
  string description = 3;
  int32 duration_ms = 4;
  int32 active_ms = 5;
  int32 recovery_ms = 6;
  double distance_cm = 7;
  double base_speed_cm_s = 8;
  double yaw_degrees = 9;
  string phase_window_policy = 10;
  string prediction_error_policy = 11;
  string reconciliation_contract_id = 12;
  bool allow_windup_locomotion = 13;
  bool allow_active_locomotion = 14;
  bool allow_recovery_locomotion = 15;
  bool allow_yaw_adjustment = 16;
  string root_motion_owner = 17;
  string contact_policy = 18;
  repeated MovementCurveSample speed_curve = 19;
  repeated MovementCurveSample vertical_curve = 20;
  string metadata_json = 21;
  MovementReconciliationContract reconciliation_contract = 22;
}

message SkillActionTimingContract {
  string skill_id = 1;
  int32 windup_ms = 2;
  int32 active_ms = 3;
  int32 recovery_ms = 4;
  int32 cooldown_ms = 5;
  int32 combo_window_ms = 6;
  string movement_lock_policy = 7;
  string queue_policy = 8;
  string cancel_policy = 9;
  string metadata_json = 10;
}

message SkillMovementActionBinding {
  string skill_id = 1;
  string movement_action_contract_id = 2;
  string starts_at_phase = 3;
  string handoff_policy = 4;
  string normal_input_policy = 5;
  string target_policy = 6;
  string contact_policy = 7;
  bool is_enabled = 8;
  string metadata_json = 9;
  MovementActionContract movement_action_contract = 10;
}

message CreatureBehaviorRuntimeContract {
  string id = 1;
  string creature_template_id = 2;
  string description = 3;
  string aggression_curve_json = 4;
  string range_policy_json = 5;
  string orbit_policy_json = 6;
  string pressure_policy_json = 7;
  string stamina_policy_json = 8;
  string metadata_json = 9;
  string target_opportunity_policy_id = 10;
  string orbit_policy_id = 11;
  CreatureTargetOpportunityPolicy target_opportunity_policy = 12;
  CreatureOrbitPolicy orbit_policy = 13;
}

message CreatureEvasionPolicy {
  string id = 1;
  string behavior_contract_id = 2;
  string description = 3;
  string dodge_skill_id = 4;
  int32 max_chain_count = 5;
  double stamina_cost_multiplier = 6;
  double retreat_chance_multiplier = 7;
  double lateral_bias = 8;
  double backstep_bias = 9;
  double pressure_threshold = 10;
  int32 cooldown_ms = 11;
  string metadata_json = 12;
}

message CreatureSkillSetupPolicy {
  string id = 1;
  string behavior_contract_id = 2;
  string skill_id = 3;
  string setup_type = 4;
  int32 min_setup_ms = 5;
  int32 max_setup_ms = 6;
  double commit_distance_cm = 7;
  double preferred_min_range_cm = 8;
  double preferred_max_range_cm = 9;
  string movement_tactic = 10;
  bool lock_side_during_setup = 11;
  bool is_enabled = 12;
  string metadata_json = 13;
}

message CreatureTargetOpportunityPolicy {
  string id = 1;
  string description = 2;
  double commit_angle_max_deg = 3;
  double min_commit_distance_cm = 4;
  double max_commit_distance_cm = 5;
  double approach_min_distance_cm = 6;
  double approach_max_distance_cm = 7;
  double bite_range_cm = 8;
  double lunge_min_range_cm = 9;
  double lunge_max_range_cm = 10;
  double maul_pressure_threshold = 11;
  int32 target_memory_ms = 12;
  string no_ready_skill_memory_policy = 13;
  bool candidate_cooldown_visibility = 14;
  bool allow_backside_commit = 15;
  string metadata_json = 16;
}

message CreatureOrbitPolicy {
  string id = 1;
  string behavior_contract_id = 2;
  string description = 3;
  string orbit_locomotion_mode = 4;
  double orbit_speed_scale = 5;
  int32 min_orbit_duration_ms = 6;
  int32 side_switch_cooldown_ms = 7;
  bool allow_side_switch_when_target_faces = 8;
  bool prefer_long_side_commit = 9;
  double side_flip_chance_multiplier = 10;
  bool lock_side_during_setup = 11;
  string metadata_json = 12;
}

message CreatureSkillBehaviorBinding {
  string id = 1;
  string behavior_contract_id = 2;
  string skill_id = 3;
  string tactical_state = 4;
  string decision_phase = 5;
  string setup_policy_id = 6;
  double min_range_cm = 7;
  double max_range_cm = 8;
  int32 priority = 9;
  double usage_weight = 10;
  string cooldown_group = 11;
  bool requires_line_of_sight = 12;
  bool is_enabled = 13;
  string metadata_json = 14;
}

message CombatCoreProfile {
  double damage_dealt_multiplier = 1;
  bool can_block = 2;
  double block_damage_reduction = 3;
  double max_posture = 4;
  double posture_damage_multiplier = 5;
  int32 posture_break_duration_ms = 6;
  double damage_taken_multiplier = 7;
  bool can_parry = 8;
  int32 parry_window_ms = 9;
  double parry_reward_multiplier = 10;
  int32 dodge_iframe_ms = 11;
}

message CombatDefenseContract {
  string id = 1;
  string name = 2;
  string description = 3;
  string defense_type = 4;
  double frontal_arc_deg = 5;
  double defender_margin_left_ratio = 6;
  double defender_margin_right_ratio = 7;
  bool stamina_damage_only_on_block = 8;
  bool health_damage_on_unblocked_hit = 9;
  bool posture_damage_on_block = 10;
  int32 perfect_block_window_ms = 11;
  int32 parry_window_ms = 12;
  double guard_damage_multiplier = 13;
  double block_stamina_drain_per_second = 14;
  string metadata_json = 15;
}

message MovementProfile {
  string id = 1;
  double max_speed = 2;
  double acceleration = 3;
  double deceleration = 4;
  double friction = 5;
  double gravity_multiplier = 6;
  double mass = 7;
  double momentum_retention = 8;
  double turn_rate = 9;
  double air_control = 10;
  double strafe_efficiency = 11;
  double backpedal_penalty = 12;
  double dodge_distance = 13;
  int32 dodge_duration_ms = 14;
  double sprint_multiplier = 15;
  double slope_limit = 16;
  bool slide_on_slope = 17;
  bool is_airborne_enabled = 18;
}

message StatusEffect {
  string id = 1;
  string name = 2;
  string effect_type = 3;
  string effect_category = 4;
  string control_type = 5;
  string stacking_mode = 6;
  int32 max_stacks = 7;
  int32 duration_ms = 8;
  bool is_pvp_enabled = 9;
  bool blocks_movement = 10;
  bool blocks_actions = 11;
  bool blocks_skills = 12;
}

message SkillControlEffect {
  string id = 1;
  bool enabled = 2;
  string status_effect_id = 3;
  int32 duration_ms = 4;
  string control_type = 5;
  string release_policy_id = 6;
}

message WorldRegion {
  string id = 1;
  string name = 2;
  string region_type = 3;
  int32 world_scale = 4;
  bool is_instanced = 5;
  int32 max_players = 6;
  double center_x = 7;
  double center_y = 8;
  double center_z = 9;
  double size_x = 10;
  double size_y = 11;
  double size_z = 12;
  double danger_level = 13;
}

message Biome {
  string id = 1;
  string name = 2;
  string region_id = 3;
  string biome_type = 4;
  double temperature = 5;
  double humidity = 6;
  double visibility_modifier = 7;
  double movement_modifier = 8;
  double stealth_modifier = 9;
  double aggression_modifier = 10;
  double resource_richness = 11;
  bool is_safe = 12;
}

message SpawnZone {
  string id = 1;
  string region_id = 2;
  string biome_id = 3;
  string name = 4;
  double center_x = 5;
  double center_y = 6;
  double center_z = 7;
  double radius = 8;
  int32 max_entities = 9;
  int32 current_entities = 10;
  int64 respawn_time_ms = 11;
  double spawn_density = 12;
  string allowed_archetypes = 13;
  double aggression_level = 14;
  bool leash_enabled = 15;
}

message Player {
  string id = 1;
  string account_id = 2;
  string name = 3;
  string creature_instance_id = 4;
  int32 level = 5;
  int64 experience = 6;
  int32 attribute_points = 7;
  double strength = 8;
  double dexterity = 9;
  double intelligence = 10;
  double endurance = 11;
  bool pvp_enabled = 12;
  bool is_in_safe_zone = 13;
  string guild_id = 14;
  string party_id = 15;
  double reputation = 16;
  int64 coin = 17;
}

message Inventory {
  string id = 1;
  string owner_type = 2;
  string owner_id = 3;
  string inventory_type = 4;
  int32 max_slots = 5;
  double max_weight = 6;
  double current_weight = 7;
  bool is_locked = 8;
}

message ItemTemplate {
  string id = 1;
  string name = 2;
  string description = 3;
  string item_type = 4;
  string rarity = 5;
  int32 max_stack = 6;
  double weight = 7;
  bool is_tradable = 8;
  bool is_destroyable = 9;
  int64 base_value = 10;
}

message InventoryItem {
  string id = 1;
  string inventory_id = 2;
  string item_id = 3;
  int32 slot_index = 4;
  int32 quantity = 5;
  double durability = 6;
  bool is_equipped = 7;
}

message InventoryWithItems {
  Inventory inventory = 1;
  repeated InventoryItem items = 2;
}

message Readiness {
  string status = 1;
  string message = 2;
}
