syntax = "proto3";

package apeiron.v1;

option go_package = "db-apeiron/gen/apeiron/v1;apeironv1";

import "apeiron/v1/common.proto";

service ProfileDataService {
  rpc GetMovementProfile(IdRequest) returns (MovementProfileResponse);
  rpc GetCombatCoreProfile(IdRequest) returns (CombatCoreProfileResponse);
  rpc GetCombatDefenseContract(IdRequest) returns (CombatDefenseContractResponse);
  rpc GetMovementActionContract(IdRequest) returns (MovementActionContractResponse);
  rpc GetActionOrientationPolicy(IdRequest) returns (ActionOrientationPolicyResponse);
  rpc GetActionEnvelopePolicy(IdRequest) returns (ActionEnvelopePolicyResponse);
  rpc GetSkillActionPolicyBinding(IdRequest) returns (SkillActionPolicyBindingResponse);
  rpc GetMovementReconciliationContract(IdRequest) returns (MovementReconciliationContractResponse);
  rpc GetRuntimeMovementReconciliationProfile(IdRequest) returns (RuntimeMovementReconciliationProfileResponse);
  rpc GetCreatureBehaviorRuntimeContract(IdRequest) returns (CreatureBehaviorRuntimeContractResponse);
  rpc GetCreatureEvasionPolicies(IdRequest) returns (CreatureEvasionPoliciesResponse);
  rpc GetCreatureSkillSetupPolicies(IdRequest) returns (CreatureSkillSetupPoliciesResponse);
  rpc GetCreatureTargetOpportunityPolicy(IdRequest) returns (CreatureTargetOpportunityPolicyResponse);
  rpc GetCreatureOrbitPolicy(IdRequest) returns (CreatureOrbitPolicyResponse);
  rpc GetCreatureSkillBehaviorBindings(IdRequest) returns (CreatureSkillBehaviorBindingsResponse);
}

message MovementProfileResponse {
  bool found = 1;
  MovementProfile profile = 2;
  string error = 3;
}

message CombatCoreProfileResponse {
  bool found = 1;
  CombatCoreProfile profile = 2;
  string error = 3;
}

message CombatDefenseContractResponse {
  bool found = 1;
  CombatDefenseContract contract = 2;
  string error = 3;
}

message MovementActionContractResponse {
  bool found = 1;
  MovementActionContract contract = 2;
  string error = 3;
}

message ActionOrientationPolicyResponse {
  bool found = 1;
  ActionOrientationPolicy policy = 2;
  string error = 3;
}

message ActionEnvelopePolicyResponse {
  bool found = 1;
  ActionEnvelopePolicy policy = 2;
  string error = 3;
}

message SkillActionPolicyBindingResponse {
  bool found = 1;
  SkillActionPolicyBinding binding = 2;
  string error = 3;
}

message MovementReconciliationContractResponse {
  bool found = 1;
  MovementReconciliationContract contract = 2;
  string error = 3;
}

message RuntimeMovementReconciliationProfileResponse {
  bool found = 1;
  RuntimeMovementReconciliationProfile profile = 2;
  string error = 3;
}

message CreatureBehaviorRuntimeContractResponse {
  bool found = 1;
  CreatureBehaviorRuntimeContract contract = 2;
  string error = 3;
}

message CreatureEvasionPoliciesResponse {
  bool found = 1;
  repeated CreatureEvasionPolicy policies = 2;
  string error = 3;
}

message CreatureSkillSetupPoliciesResponse {
  bool found = 1;
  repeated CreatureSkillSetupPolicy policies = 2;
  string error = 3;
}

message CreatureTargetOpportunityPolicyResponse {
  bool found = 1;
  CreatureTargetOpportunityPolicy policy = 2;
  string error = 3;
}

message CreatureOrbitPolicyResponse {
  bool found = 1;
  CreatureOrbitPolicy policy = 2;
  string error = 3;
}

message CreatureSkillBehaviorBindingsResponse {
  bool found = 1;
  repeated CreatureSkillBehaviorBinding bindings = 2;
  string error = 3;
}
